services:
  postgres:
    image: postgres:16
    container_name: team-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Runs ONLY on first init of the volume (fresh DB)
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

volumes:
  pgdata: